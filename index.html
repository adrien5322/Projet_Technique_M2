<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DAR_Cyber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1 class="mb-4">DAR_Cyber Dashboard</h1>

<button class="btn btn-primary" onclick="scanNetwork()">Scanner le réseau</button>

<h2 class="mt-4">Résultats du scan</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>IP</th>
            <th>Ports ouverts</th>
        </tr>
    </thead>
    <tbody id="scanTable"></tbody>
</table>

<h2 class="mt-4">Alertes</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Type</th>
            <th>IP</th>
            <th>Sévérité</th>
        </tr>
    </thead>
    <tbody id="alertTable"></tbody>
</table>

<script>

async function scanNetwork() {
    try {
        console.log("Scan lancé");

        const response = await fetch("http://localhost:8000/scan");

        if (!response.ok) {
            throw new Error("Erreur API");
        }

        const data = await response.json();

        console.log("Résultat:", data);

        document.getElementById("scanTable").innerHTML =
            "<tr><td colspan='2'>Scan OK (voir console)</td></tr>";

    } catch (error) {
        console.error("Erreur:", error);
        alert("Erreur : " + error.message);
    }
}


// Rafraîchir les alertes toutes les 3 secondes
setInterval(loadAlerts, 3000);

</script>

</body>
</html>
