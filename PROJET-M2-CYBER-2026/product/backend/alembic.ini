[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the migration files to be organized in a folder structure
# file_template = %%(year)d/%(month).2d/%(day).2d_%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path in migration scripts
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to true to run migrations in transaction per migration module
# (can be overridden per migration with TransactionPerMigration context manager)
# transaction_per_migration = false

# set to true to run migration in a single transaction (if possible)
# (can be overridden per migration with TransactionPerMigration context manager)
# transaction_per_migration = true

# version location specification; This defaults to alembic/versions.  When
# using multiple version directories, initial revisions must be specified with --version-path.
# The path separator used in the path specification is the separator used by the
# target database's operating system (e.g. / on Unix, \ on Windows)
# version_locations = %(here)s/alembic/versions

# version path token; This defaults to alembic
# version_path_separator = semicolon ;  # use a semicolon to separate version paths
# version_path_separator = space ;  # use a space to separate version paths
# version_path_separator = newline ;  # use a newline to separate version paths

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# sqlalchemy.url is now read from the application config
# See alembic/env.py for configuration loading

# Default URL for local development (SQLite) - overridden by env.py if DATABASE_URL is set
sqlalchemy.url = sqlite:///./dev.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
