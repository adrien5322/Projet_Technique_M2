# Override pour le développement local
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up

version: '3.8'

services:
  backend:
    # En développement, on monte le code en volume pour le hot-reload
    volumes:
      - ./backend:/app:cached
      - /app/__pycache__  # Exclure __pycache__ du volume
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Exposer les ports de debug si nécessaire
    ports:
      - "${PORT:-8000}:8000"

  postgres:
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=devinciwatch
      - POSTGRES_PASSWORD=devinciwatch
      - POSTGRES_DB=devinciwatch_dev
    ports:
      - "5432:5432"

  redis:
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
